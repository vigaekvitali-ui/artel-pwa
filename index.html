<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>АРТЕЛЬ v3.0 ПРЕМИУМ</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

    <style>
        :root { --blue: #0047ab; --neon: #ff5e00; --bg: #0a0a0a; --text: #bdc3c7; }
        [x-cloak] { display: none !important; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; padding-bottom: 90px; }
        header { padding: 15px; text-align: center; border-bottom: 2px solid var(--blue); background: #000; color: var(--neon); font-weight: bold; }
        
        .page { display: none; padding: 15px; max-width: 1000px; margin: 0 auto; }
        .active { display: block !important; }

        /* Сетка для первой страницы */
        .grid-main { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .grid-right { display: grid; grid-template-rows: auto auto; gap: 15px; }
        
        .card { border: 1px solid var(--blue); background: rgba(0,71,171,0.1); padding: 15px; border-left: 5px solid var(--blue); height: 100%; box-sizing: border-box; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 2px solid var(--blue); z-index: 1000; }
        .nav-item { color: #444; cursor: pointer; }
        .nav-item.active { color: var(--neon); transform: scale(1.3); }
        
        .btn-pusker { background: var(--blue); color: white; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        input { width: 100%; padding: 12px; background: #000; color: #fff; border: 1px solid var(--blue); box-sizing: border-box; }
        
        /* Стили курилки с картинками */
        .zone-box { border: 2px solid var(--blue); margin-bottom: 15px; text-align: center; background: #000; overflow: hidden; }
        .zone-box img { width: 100%; height: 150px; object-fit: cover; opacity: 0.7; }
        .zone-info { padding: 10px; }
        .zone-info b { color: var(--neon); text-transform: uppercase; }
        
        .rank-badge { color: var(--neon); border: 1px solid var(--neon); padding: 5px; display: inline-block; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body x-data="artelApp" x-init="init()">

<header>🛠 АРТЕЛЬ ФОРДОВА И БЕНЦОВА 🛠</header>

<div x-cloak :class="{'active': true}">
    <div class="page" :class="{'active': p === 1}">
        <div class="grid-main">
            <div class="card">
                <strong style="color:var(--neon)">📜 УСТАВ АРТЕЛИ</strong>
                <div style="font-size:0.8rem; margin-top:15px;">
                    <template x-for="(z, i) in zapovedi">
                        <div style="margin-bottom:8px;"><b x-text="(i+1) + '.'"></b> <span x-text="z"></span></div>
                    </template>
                </div>
            </div>
            <div class="grid-right">
                <div class="card" style="text-align:center;">
                    <b style="color:var(--neon)">📅 ДАТА</b><br><br>
                    <div style="font-size:1.1rem;" x-text="today"></div>
                </div>
                <div class="card" style="text-align:center;">
                    <b style="color:var(--neon)">🎖 РАНГ СИСТЕМЫ</b><br>
                    <div class="rank-badge">МАСТАДОНТ</div>
                    <div style="font-size:0.7rem; margin-top:10px; opacity:0.6;">Доступ: Полный</div>
                </div>
            </div>
        </div>
    </div>

    <div class="page" :class="{'active': p === 2}">
        <template x-if="!isReg">
            <div class="card"><b>РЕГИСТРАЦИЯ</b><input type="text" x-model="userName" style="margin-top:10px;"><button class="btn-pusker" @click="register()">ВХОД</button></div>
        </template>
        <template x-if="isReg">
            <div>
                <div id="chat-win" style="height:350px; overflow-y:auto; border:1px solid var(--blue); padding:10px; background:#000;">
                    <template x-for="m in msgs">
                        <div style="margin-bottom:10px; border-left:2px solid var(--blue); padding-left:8px;">
                            <small style="color:var(--neon)" x-text="m.username"></small><br><span x-text="m.text"></span>
                        </div>
                    </template>
                </div>
                <div style="display:flex; margin-top:10px;"><input type="text" x-model="newM" @keyup.enter="sendM()"><button @click="sendM()" class="btn-pusker" style="width:80px; margin:0;">ОК</button></div>
            </div>
        </template>
    </div>

    <div class="page" :class="{'active': p === 7}">
        <div class="zone-box">
            <img src="https://images.unsplash.com/photo-1626071445451-b06f3630656e?auto=format&fit=crop&w=800&q=80" alt="сигареты">
            <div class="zone-info"><b>🚬 ТАБАК АРТЕЛИ</b><br><a href="https://onliner.by" target="_blank" style="color:#fff; text-decoration:none;">Onliner.by</a></div>
        </div>
        <div class="zone-box">
            <img src="https://images.unsplash.com/photo-1559496417-e7f25cb247f3?auto=format&fit=crop&w=800&q=80" alt="кофе">
            <div class="zone-info"><b>☕ КОФЕ АРТЕЛИ</b><br><a href="https://e-lib.belstu.by" target="_blank" style="color:#fff; text-decoration:none;">Библиотека БГТУ</a></div>
        </div>
        <div class="zone-box">
            <img src="https://images.unsplash.com/photo-1527281400828-ac737a999b9a?auto=format&fit=crop&w=800&q=80" alt="виски">
            <div class="zone-info"><b>🥃 ВИСКЪ "АРТЕЛЬНЫЙ"</b><br><a href="http://radiopotok.ru" target="_blank" style="color:#fff; text-decoration:none;">Радиопоток</a></div>
        </div>
    </div>
    
    <div class="page" :class="{'active': p === 3}"><div class="card"><b>СКЛАД</b></div></div>
    <div class="page" :class="{'active': p === 4}"><div class="card"><b>ТЕХ-АРХИВ</b></div></div>
    <div class="page" :class="{'active': p === 5}"><div class="card"><b>ПРОМТЫ</b><br><a href="https://promptcowboy.com" target="_blank" style="color:var(--neon)">ОТКРЫТЬ КОВБОЯ</a></div></div>
    <div class="page" :class="{'active': p === 6}">
        <div class="card"><b>СЕРВИСЫ</b><br>
            <a href="https://gemini.google.com" target="_blank" style="display:block; margin:10px 0; color:#fff;">Google Gemini</a>
            <a href="https://suno.com" target="_blank" style="display:block; margin:10px 0; color:#fff;">Suno Music</a>
        </div>
    </div>
    <div class="page" :class="{'active': p === 8}"><div class="card" style="text-align:center; background:#fff;"><div id="qrcode"></div></div></div>

</div>

<nav class="nav-bar">
    <template x-for="(ic, i) in ['home','message-square','package','wrench','brain','zap','coffee','settings']">
        <div class="nav-item" :class="{'active': p === (i+1)}" @click="p=(i+1); refresh()">
            <i :data-lucide="ic"></i>
        </div>
    </template>
</nav>

<script>
    const _URL = 'https://grsszunlfmehyykkvccj.supabase.co';
    const _KEY = 'sb_publishable_lOjqRJ2R_tHLo0GiLPjaYA_6UYCfCaX';
    let db = null;
    try { db = supabase.createClient(_URL, _KEY); } catch(e) {}

    document.addEventListener('alpine:init', () => {
        Alpine.data('artelApp', () => ({
            p: 1, today: '', isReg: localStorage.getItem('reg_v7') || false,
            userName: localStorage.getItem('user_v7') || '',
            msgs: [],
            zapovedi: ['Изолента — сила','Мат ускоряет ремонт','Лишних деталей нет','Не лезь — работает','Семь раз отмерь','Уважай мазуту','Инструмент — святое','Не уверен — не крути','Артель — семья','Перекур по ГОСТу'],
            
            init() {
                const d = new Date();
                this.today = d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
                lucide.createIcons();
                this.genQR();
                if(db) this.load();
            },
            refresh() { setTimeout(() => lucide.createIcons(), 50); },
            register() { if(this.userName) { this.isReg = true; localStorage.setItem('reg_v7', true); localStorage.setItem('user_v7', this.userName); }},
            async load() {
                const {data:m} = await db.from('messages').select('*').order('id',{ascending:false}).limit(10);
                if(m) this.msgs = m.reverse();
            },
            async sendM() { if(!this.newM) return; await db.from('messages').insert([{username:this.userName, text:this.newM}]); this.newM = ''; },
            genQR() { 
                const qr = qrcode(0, 'M'); qr.addData(window.location.href); qr.make();
                document.getElementById('qrcode').innerHTML = qr.createImgTag(4);
            }
        }));
    });
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
</body>
</html>
